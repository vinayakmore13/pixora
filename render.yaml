services:
  # 1. Frontend - React (Static Site)
  - type: static
    name: pixora-frontend
    env: static
    buildCommand: npm install && npm run download:models && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: pixora-backend
          property: host
      - key: VITE_AI_PROVIDER
        value: LOCAL

  # 2. Backend - FastAPI + DeepFace AI (Web Service)
  - type: web
    name: pixora-backend
    env: python
    plan: standard  # DeepFace + TensorFlow needs >=1GB RAM
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        fromService:
          type: static
          name: pixora-frontend
          property: url
